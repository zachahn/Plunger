<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5FB2F5"/>
      <stop offset="1" stop-color="#1E6FD9"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D9A05B"/>
      <stop offset="0.45" stop-color="#C08445"/>
      <stop offset="1" stop-color="#8F5A28"/>
    </linearGradient>
    <linearGradient id="rubber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0873B"/>
      <stop offset="0.55" stop-color="#E4691F"/>
      <stop offset="1" stop-color="#B24A10"/>
    </linearGradient>
    <linearGradient id="lip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D8641C"/>
      <stop offset="1" stop-color="#A34310"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="squircle">
      <rect x="64" y="64" width="896" height="896" rx="200"/>
    </clipPath>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>

  <g clip-path="url(#squircle)">
    <ellipse cx="640" cy="912" rx="270" ry="52" fill="#0A2C66" opacity="0.28" filter="url(#soften)"/>
    <g transform="translate(612,612) rotate(-40) scale(1.1)">
      <!-- handle: furthest back -->
      <rect x="-28" y="-1200" width="56" height="970" rx="12" fill="url(#wood)"/>
      <!-- collar: overlaps the handle, tucks behind the dome -->
      <path d="M -54,-244 A 54 16 0 0 1 54,-244 L 54,-170 L -54,-170 Z" fill="#B84E14"/>
      <!-- dome: frontmost; its top edge occludes the collar -->
      <path d="M -215,95
               C -218,-35 -162,-150 -58,-188
               A 58 14 0 0 1 58,-188
               C 162,-150 218,-35 215,95
               A 215 35 0 0 1 -215,95
               Z"
            fill="url(#rubber)"/>
      <!-- arc tracing where the collar enters the dome -->
      <path d="M -58,-188 A 58 14 0 0 1 58,-188" fill="none" stroke="#8F3708" stroke-width="8" stroke-opacity="0.55"/>
      <!-- latitude seam on the dome, arching up toward the handle -->
      <path d="M -170,-80 A 173 62 0 0 1 170,-80" fill="none" stroke="#A64612" stroke-width="10" stroke-opacity="0.35"/>
      <!-- underside face of the dome's end -->
      <path d="M -215,95 A 215 45 0 0 1 215,95 A 215 35 0 0 1 -215,95 Z" fill="#8F3708" fill-opacity="0.4"/>
      <!-- arc tracing the end of the half sphere, arching up like the seams -->
      <path d="M -215,95 A 215 45 0 0 1 215,95" fill="none" stroke="#7E3006" stroke-width="11" stroke-opacity="0.75"/>
      <!-- short cylinder; its start is rounded, arching up like the dome arcs -->
      <path d="M -132,122
               A 132 28 0 0 1 132,122
               C 132,162 134,186 144,208
               A 144 32 0 0 1 -144,208
               C -134,186 -132,162 -132,122
               Z"
            fill="url(#lip)"/>
      <path d="M -132,122 A 132 28 0 0 1 132,122" fill="none" stroke="#7E3006" stroke-width="9" stroke-opacity="0.6"/>
      <!-- opening, squashed to the same ratio as the other circles -->
      <ellipse cx="0" cy="208" rx="144" ry="32" fill="#C85A1A"/>
      <ellipse cx="0" cy="206" rx="116" ry="26" fill="#4A1B06"/>
    </g>
  </g>
</svg>
